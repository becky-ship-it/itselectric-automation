# Email routing decision tree for itselectric-automation.
# Copy this file to decision_tree.yaml and replace the email_id values with
# real HubSpot transactional email template IDs.
#
# HOW IT WORKS
# ------------
# Each node is either a leaf or a branch.
#
# Leaf:   email_id: 12345        # sends this HubSpot template
#         email_id: null         # sends nothing (opt out of routing)
#
# Branch: condition:
#           field: <field>       # one of: distance_miles, driver_state,
#                                #         charger_state, charger_city
#           op: <op>             # lt, lte, gt, gte, eq, ne, in
#           value: <value>       # number, string, or list (for "in")
#         then: <node>           # evaluated when condition is true
#         else: <node>           # evaluated when condition is false
#
# String comparisons (eq, ne, in) are case-insensitive.
#
# IMPORTANT: use "then"/"else" — NOT "yes"/"no". PyYAML parses bare yes/no as
# booleans, which will cause a runtime KeyError.
#
# EXAMPLE TREE
# ------------
# Scenario outcomes:
#   Utah driver, 150 mi from Denver charger      → Waitlist (22222)
#   LA driver, 15 mi from LA charger             → Get California Car Info (51274065)
#   Dallas TX driver, 99 mi from Waco charger    → Get General Car Info (11111)

condition:
  field: distance_miles
  op: lt
  value: 0.5
then:
  email_id: 11111   # Get General Car Info — driver is already right next to a charger
else:
  condition:
    field: distance_miles
    op: lt
    value: 100
  then:
    condition:
      field: driver_state
      op: eq
      value: CA
    then:
      condition:
        field: charger_city
        op: in
        value:
          - Los Angeles
          - San Francisco
      then:
        email_id: 51274065   # Get California Car Info
      else:
        email_id: 22222   # Waitlist — CA driver but not near an LA/SF charger
    else:
      email_id: 11111     # Get General Car Info — within range but outside CA
  else:
    email_id: 22222       # Waitlist — more than 100 miles from nearest charger
