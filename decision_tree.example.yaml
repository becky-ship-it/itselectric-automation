# Email routing decision tree for itselectric-automation.
# Copy this file to decision_tree.yaml and adjust template names to match
# the .txt files in your template_dir.
#
# HOW IT WORKS
# ------------
# Each node is either a leaf or a branch.
#
# Leaf:   template: general_car_info   # sends email_templates/general_car_info.txt
#         template: null               # sends nothing (opt out of routing)
#
# Branch: condition:
#           field: <field>       # one of: distance_miles, driver_state,
#                                #         charger_state, charger_city
#           op: <op>             # lt, lte, gt, gte, eq, ne, in
#           value: <value>       # number, string, or list (for "in")
#         then: <node>           # evaluated when condition is true
#         else: <node>           # evaluated when condition is false
#
# String comparisons (eq, ne, in) are case-insensitive.
#
# IMPORTANT: use "then"/"else" — NOT "yes"/"no". PyYAML parses bare yes/no as
# booleans, which will cause a runtime KeyError.
#
# EXAMPLE TREE
# ------------
# Scenario outcomes:
#   Utah driver, 150 mi from Denver charger      → waitlist
#   LA driver, 15 mi from LA charger             → california_car_info
#   Dallas TX driver, 99 mi from Waco charger    → general_car_info

condition:
  field: distance_miles
  op: lt
  value: 0.5
then:
  template: general_car_info   # driver is already right next to a charger
else:
  condition:
    field: distance_miles
    op: lt
    value: 100
  then:
    condition:
      field: driver_state
      op: eq
      value: CA
    then:
      condition:
        field: charger_city
        op: in
        value:
          - Los Angeles
          - San Francisco
      then:
        template: california_car_info
      else:
        template: waitlist       # CA driver but not near an LA/SF charger
    else:
      template: general_car_info # within range but outside CA
  else:
    template: waitlist           # more than 100 miles from nearest charger
