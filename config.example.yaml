# Pipeline configuration for itselectric-automation.
# Copy this file to config.yaml and fill in your values.
# config.yaml is gitignored — never commit it.
#
# CLI flags override these values when provided.

label: INBOX
max_messages: 100
body_length: 200
spreadsheet_id: ""   # Google Spreadsheet ID from the sheet URL
sheet: Sheet1
content_limit: 5000

# Path to EV charger locations CSV (default: bundled src/itselectric/data/chargers.csv)
# chargers: src/itselectric/data/chargers.csv

# Path to JSON file that caches geocoded addresses (avoids repeated API calls)
geocache: geocache.json

# Load emails from .txt files in this directory instead of Gmail (skips auth).
# Useful for local dev and integration testing. Leave empty to use Gmail.
# fixture_dir: tests/fixtures/emails

# HubSpot access token. When set, creates/updates contacts in HubSpot CRM.
# Get one from: HubSpot Development → Legacy Apps → your app → Auth → Access token
# Runs independently of spreadsheet_id — you can set one, both, or neither.
# hubspot_access_token: ""
